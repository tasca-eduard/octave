    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Octave Mapper",
      "description": "Interactive tool to visualize the relationship between piano octaves and a 24-fret guitar fretboard. Build chords and see note mappings across both instruments.",
      "url": "https://octave.devedco.com/",
      "applicationCategory": "MusicApplication",
      "operatingSystem": "Any",
      "browserRequirements": "Requires JavaScript",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "Interactive piano keyboard (C2-B6)",
        "24-fret guitar fretboard visualization",
        "Bidirectional note highlighting",
        "Chord detection",
        "Custom guitar tunings",
        "Audio playback",
        "Customizable octave colors"
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <div style="padding:2rem;text-align:center;font-family:system-ui;color:#eee;background:#0f0f1a;min-height:100vh">
        <h1>Octave Mapper</h1>
        <p>An interactive tool to visualize the relationship between piano octaves and a 24-fret guitar fretboard.</p>
        <p>Please enable JavaScript to use this application.</p>
        <h2>Features</h2>
        <ul style="list-style:none;padding:0">
          <li>Interactive piano keyboard spanning C2 to B6</li>
          <li>24-fret guitar fretboard with standard and custom tunings</li>
          <li>Click notes to build chords — see them on both instruments</li>
          <li>Automatic chord name detection</li>
          <li>Audio playback with Tone.js synthesizer</li>
          <li>10 tuning presets including Drop D, Open G, DADGAD</li>
          <li>Per-string tuning adjustment</li>
          <li>Customizable octave color palette</li>
        </ul>
      </div>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
